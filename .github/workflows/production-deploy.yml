name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Unit Tests
        run: npm test
        continue-on-error: true
        env:
           CI: true

      - name: Create Runtime Config
        run: |
          echo "{\"SERPER_API_KEY\": \"$SERPER_API_KEY\"}" > env-config.json
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          build_output=$(npm run build 2>&1)
          build_exit=$?
          set -e

          printf '%s\n' "$build_output"

          {
            echo "output<<EOF"
            printf '%s\n' "$build_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$build_exit" -ne 0 ]; then
            exit "$build_exit"
          fi
        env:
          NEXT_PUBLIC_DEV_AUTH_BYPASS: "false"
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          # Add other build-time env vars here if needed, or rely on .env.production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Manual deploy step to allow passing --force
      - name: Deploy to Firebase (Manual)
        id: deploy
        shell: bash
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          set +e
          deploy_output=$(
            {
              npm install -g firebase-tools
              echo "$GCP_SA_KEY" > "$HOME/gcp_key.json"
              export GOOGLE_APPLICATION_CREDENTIALS="$HOME/gcp_key.json"
              firebase deploy --project studio-567050101-bc6e8 --force --only hosting,functions
              rm "$HOME/gcp_key.json"
              rm env-config.json
            } 2>&1
          )
          deploy_exit=$?
          set -e

          printf '%s\n' "$deploy_output"

          {
            echo "output<<EOF"
            printf '%s\n' "$deploy_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$deploy_exit" -ne 0 ]; then
            exit "$deploy_exit"
          fi

      - name: Notify Firebase build failure
        if: failure() && steps.build.outcome == 'failure'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FAILURE_SUMMARY: ${{ steps.build.outputs.output }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          payload=$(jq -n \
            --arg workflowName "${{ github.workflow }}" \
            --arg workflowFile ".github/workflows/production-deploy.yml" \
            --arg runId "${{ github.run_id }}" \
            --arg runNumber "${{ github.run_number }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "$short_sha" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg failureStep "Build" \
            --arg failureSummary "${FAILURE_SUMMARY:-GitHub Actions reported a Firebase build failure.}" \
            --arg deployTarget "studio-567050101-bc6e8" \
            --arg provider "firebase-hosting-functions" \
            --arg triggeredAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              type: "deployment_failure",
              data: {
                workflowName: $workflowName,
                workflowFile: $workflowFile,
                runId: $runId,
                runNumber: $runNumber,
                runUrl: $runUrl,
                attempt: $attempt,
                sha: $sha,
                shortSha: $shortSha,
                branch: $branch,
                actor: $actor,
                failureStep: $failureStep,
                failureSummary: $failureSummary,
                deployTarget: $deployTarget,
                provider: $provider,
                triggeredAt: $triggeredAt
              }
            }')

          curl -s -X POST https://bakedbot.ai/api/cron/auto-escalate \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Warning: auto-escalate deployment failure call failed (non-fatal)"

      - name: Notify Firebase deploy failure
        if: failure() && steps.deploy.outcome == 'failure'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FAILURE_SUMMARY: ${{ steps.deploy.outputs.output }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          payload=$(jq -n \
            --arg workflowName "${{ github.workflow }}" \
            --arg workflowFile ".github/workflows/production-deploy.yml" \
            --arg runId "${{ github.run_id }}" \
            --arg runNumber "${{ github.run_number }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "$short_sha" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg failureStep "Deploy to Firebase (Manual)" \
            --arg failureSummary "${FAILURE_SUMMARY:-GitHub Actions reported a Firebase deploy failure.}" \
            --arg deployTarget "studio-567050101-bc6e8" \
            --arg provider "firebase-hosting-functions" \
            --arg triggeredAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              type: "deployment_failure",
              data: {
                workflowName: $workflowName,
                workflowFile: $workflowFile,
                runId: $runId,
                runNumber: $runNumber,
                runUrl: $runUrl,
                attempt: $attempt,
                sha: $sha,
                shortSha: $shortSha,
                branch: $branch,
                actor: $actor,
                failureStep: $failureStep,
                failureSummary: $failureSummary,
                deployTarget: $deployTarget,
                provider: $provider,
                triggeredAt: $triggeredAt
              }
            }')

          curl -s -X POST https://bakedbot.ai/api/cron/auto-escalate \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Warning: auto-escalate deployment failure call failed (non-fatal)"

      - name: Notify Firebase deployment success
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          payload=$(jq -n \
            --arg workflowName "${{ github.workflow }}" \
            --arg workflowFile ".github/workflows/production-deploy.yml" \
            --arg runId "${{ github.run_id }}" \
            --arg runNumber "${{ github.run_number }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "$short_sha" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg deployTarget "studio-567050101-bc6e8" \
            --arg provider "firebase-hosting-functions" \
            --arg deployedUrl "https://bakedbot.ai" \
            --arg triggeredAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              type: "deployment_success",
              data: {
                workflowName: $workflowName,
                workflowFile: $workflowFile,
                runId: $runId,
                runNumber: $runNumber,
                runUrl: $runUrl,
                attempt: $attempt,
                sha: $sha,
                shortSha: $shortSha,
                branch: $branch,
                actor: $actor,
                deployTarget: $deployTarget,
                provider: $provider,
                deployedUrl: $deployedUrl,
                triggeredAt: $triggeredAt
              }
            }')

          curl -s -X POST https://bakedbot.ai/api/cron/auto-escalate \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Warning: auto-escalate deployment success call failed (non-fatal)"
