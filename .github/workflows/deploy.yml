name: Deploy to Firebase App Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      APPHOSTING_PROJECT_ID: studio-567050101-bc6e8
      APPHOSTING_BACKEND: bakedbot-prod
      APPHOSTING_LOCATION: us-central1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Trigger App Hosting Rollout
        id: rollout
        shell: bash
        run: |
          set -euo pipefail
          rollout_json="$(mktemp)"

          set +e
          node scripts/firebase-apphosting.mjs rollout \
            --project "$APPHOSTING_PROJECT_ID" \
            --backend "$APPHOSTING_BACKEND" \
            --location "$APPHOSTING_LOCATION" \
            --commit "${GITHUB_SHA}" \
            --fast-start-timeout-seconds 180 \
            --json > "$rollout_json"
          rollout_exit=$?
          set -e

          cat "$rollout_json"

          {
            echo "started_at=$(jq -r '.startedAt // empty' "$rollout_json")"
            echo "reason=$(jq -r '.reason // empty' "$rollout_json")"
            echo "accepted=$(jq -r '.accepted // false' "$rollout_json")"
            echo "output<<EOF"
            cat "$rollout_json"
            echo "EOF"
            echo "trigger_exit=$rollout_exit"
          } >> "$GITHUB_OUTPUT"

          if [ "$rollout_exit" -ne 0 ] || [ "$(jq -r '.accepted // false' "$rollout_json")" != "true" ]; then
            echo "ERROR: App Hosting rollout trigger failed before Cloud Build polling could begin."
            exit "${rollout_exit:-1}"
          fi

      - name: Reuse existing App Hosting rollout
        if: steps.rollout.outputs.reason == 'already_queued_or_in_progress'
        shell: bash
        run: |
          echo "Firebase App Hosting already has a rollout queued or in progress for ${APPHOSTING_BACKEND}."
          echo "Skipping commit-specific Cloud Build resolution for ${GITHUB_SHA}."

      - name: Resolve App Hosting Cloud Build
        id: apphosting_build
        if: steps.rollout.outputs.reason != 'already_queued_or_in_progress'
        shell: bash
        run: |
          set -euo pipefail
          resolve_json="$(mktemp)"
          resolve_exit=1

          for attempt in $(seq 1 18); do
            : > "$resolve_json"

            set +e
            node scripts/firebase-apphosting.mjs resolve \
              --project "$APPHOSTING_PROJECT_ID" \
              --backend "$APPHOSTING_BACKEND" \
              --location "$APPHOSTING_LOCATION" \
              --commit "${GITHUB_SHA}" \
              --after "${{ steps.rollout.outputs.started_at }}" \
              --json > "$resolve_json"
            resolve_exit=$?
            set -e

            cat "$resolve_json"

            if [ "$resolve_exit" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -lt 18 ]; then
              echo "Cloud Build not visible yet for ${GITHUB_SHA} (attempt $attempt/18). Retrying in 10s..."
              sleep 10
            fi
          done

          {
            echo "summary<<EOF"
            cat "$resolve_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$resolve_exit" -ne 0 ]; then
            echo "ERROR: Unable to resolve the App Hosting Cloud Build for ${GITHUB_SHA}."
            exit "$resolve_exit"
          fi

          echo "cloud_build_id=$(jq -r '.cloudBuildId // empty' "$resolve_json")" >> "$GITHUB_OUTPUT"
          echo "apphosting_build_id=$(jq -r '.appHostingBuildId // empty' "$resolve_json")" >> "$GITHUB_OUTPUT"
          echo "build_logs_url=$(jq -r '.buildLogsUrl // empty' "$resolve_json")" >> "$GITHUB_OUTPUT"

      - name: Wait for App Hosting Build and Rollout
        id: apphosting_wait
        if: steps.rollout.outputs.reason != 'already_queued_or_in_progress'
        shell: bash
        run: |
          set -euo pipefail
          wait_json="$(mktemp)"

          set +e
          node scripts/firebase-apphosting.mjs wait \
            --project "$APPHOSTING_PROJECT_ID" \
            --backend "$APPHOSTING_BACKEND" \
            --location "$APPHOSTING_LOCATION" \
            --cloud-build "${{ steps.apphosting_build.outputs.cloud_build_id }}" \
            --apphosting-build "${{ steps.apphosting_build.outputs.apphosting_build_id }}" \
            --timeout-minutes 70 \
            --json > "$wait_json"
          wait_exit=$?
          set -e

          cat "$wait_json"

          {
            echo "summary<<EOF"
            cat "$wait_json"
            echo "EOF"
            echo "wait_exit=$wait_exit"
          } >> "$GITHUB_OUTPUT"

          if [ "$wait_exit" -ne 0 ]; then
            echo "ERROR: App Hosting Cloud Build or rollout failed."
            exit "$wait_exit"
          fi

      - name: Notify Firebase deployment failure
        if: failure()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          failure_summary=$(cat <<'EOF'
          ${{ steps.rollout.outputs.output }}

          Resolved Cloud Build:
          ${{ steps.apphosting_build.outputs.summary }}

          Wait Result:
          ${{ steps.apphosting_wait.outputs.summary }}
          EOF
          )

          payload=$(jq -n \
            --arg workflowName "${{ github.workflow }}" \
            --arg workflowFile ".github/workflows/deploy.yml" \
            --arg runId "${{ github.run_id }}" \
            --arg runNumber "${{ github.run_number }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "$short_sha" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg failureStep "App Hosting deployment" \
            --arg failureSummary "$failure_summary" \
            --arg deployTarget "bakedbot-prod" \
            --arg provider "firebase-app-hosting" \
            --arg cloudBuildId "${{ steps.apphosting_build.outputs.cloud_build_id }}" \
            --arg appHostingBuildId "${{ steps.apphosting_build.outputs.apphosting_build_id }}" \
            --arg buildLogsUrl "${{ steps.apphosting_build.outputs.build_logs_url }}" \
            --arg triggeredAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              type: "deployment_failure",
              data: {
                workflowName: $workflowName,
                workflowFile: $workflowFile,
                runId: $runId,
                runNumber: $runNumber,
                runUrl: $runUrl,
                attempt: $attempt,
                sha: $sha,
                shortSha: $shortSha,
                branch: $branch,
                actor: $actor,
                failureStep: $failureStep,
                failureSummary: $failureSummary,
                deployTarget: $deployTarget,
                provider: $provider,
                cloudBuildId: $cloudBuildId,
                appHostingBuildId: $appHostingBuildId,
                buildLogsUrl: $buildLogsUrl,
                triggeredAt: $triggeredAt
              }
            }')

          curl -s -X POST https://bakedbot.ai/api/cron/auto-escalate \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Warning: auto-escalate deployment failure call failed (non-fatal)"

      - name: Notify Firebase deployment success
        if: success()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          payload=$(jq -n \
            --arg workflowName "${{ github.workflow }}" \
            --arg workflowFile ".github/workflows/deploy.yml" \
            --arg runId "${{ github.run_id }}" \
            --arg runNumber "${{ github.run_number }}" \
            --arg runUrl "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg attempt "${{ github.run_attempt }}" \
            --arg sha "${{ github.sha }}" \
            --arg shortSha "$short_sha" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg deployTarget "bakedbot-prod" \
            --arg provider "firebase-app-hosting" \
            --arg deployedUrl "https://bakedbot.ai" \
            --arg rolloutReason "${{ steps.rollout.outputs.reason }}" \
            --arg triggeredAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              type: "deployment_success",
              data: {
                workflowName: $workflowName,
                workflowFile: $workflowFile,
                runId: $runId,
                runNumber: $runNumber,
                runUrl: $runUrl,
                attempt: $attempt,
                sha: $sha,
                shortSha: $shortSha,
                branch: $branch,
                actor: $actor,
                deployTarget: $deployTarget,
                provider: $provider,
                deployedUrl: $deployedUrl,
                rolloutReason: $rolloutReason,
                triggeredAt: $triggeredAt
              }
            }')

          curl -s -X POST https://bakedbot.ai/api/cron/auto-escalate \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo "Warning: auto-escalate deployment success call failed (non-fatal)"
