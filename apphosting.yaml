# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

env:
  # Build-time memory allocation — Cloud Build machine has 2048 MiB RAM + swap.
  # 6GB caused swap-thrash → 56min hangs. 3GB OOMs during webpack. 4GB is the sweet spot:
  # allows webpack to complete while keeping swap usage manageable.
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=4096"
    availability: [ BUILD ]
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
    availability: [ BUILD ]
  # Runtime memory allocation
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=12288"
    availability: [ RUNTIME ]
  # Skip Next.js Node version check (Firebase App Hosting uses Node 18)
  - variable: NEXT_SKIP_NODE_VERSION_CHECK
    value: "1"
    availability: [ BUILD ]
  # Skip Remotion bundle in Cloud Build — saves 5-10 min + significant memory.
  # Video rendering uses runtime bundling or Cloud Run renderer in production.
  - variable: SKIP_REMOTION_BUNDLE
    value: "true"
    availability: [ BUILD ]
  # Firebase
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY@8
